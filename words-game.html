<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Words Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #0a0e1a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Animated gradient background */
  .bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 20%, #1a0533 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #001a3a 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, #0a0e1a 0%, #050810 100%);
    z-index: 0;
  }

  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 20%, rgba(100,60,220,0.15) 0%, transparent 40%),
                radial-gradient(ellipse at 30% 70%, rgba(0,150,255,0.1) 0%, transparent 40%);
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    0% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Stars */
  .stars {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 70% 50%, rgba(180,120,255,0.4) 0%, transparent 100%);
  }

  .phone {
    position: relative;
    width: 390px;
    height: 844px;
    z-index: 1;
    display: flex;
    flex-direction: column;
    padding: 52px 0 0;
    overflow: hidden;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px 16px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #fff 0%, #b8a0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .level-badge {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
  }

  .coins {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,200,0,0.1);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,200,0,0.2);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #ffd060;
  }

  .coin-icon { font-size: 16px; }

  /* Found words display */
  .found-words {
    display: flex;
    gap: 8px;
    padding: 0 20px 12px;
    flex-wrap: wrap;
    min-height: 38px;
  }

  .found-word-tag {
    background: rgba(120,80,255,0.2);
    border: 1px solid rgba(150,100,255,0.4);
    border-radius: 16px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 700;
    color: #c4a8ff;
    letter-spacing: 1px;
    animation: wordAppear 0.4s cubic-bezier(0.34,1.56,0.64,1);
    text-shadow: 0 0 12px rgba(180,140,255,0.6);
  }

  @keyframes wordAppear {
    from { transform: scale(0) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* Crossword grid */
  .grid-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px 20px;
  }

  .crossword-grid {
    position: relative;
    display: grid;
    gap: 4px;
  }

  .cell {
    width: 46px;
    height: 46px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    transition: all 0.3s ease;
  }

  .cell.empty {
    background: transparent;
  }

  .cell.blank {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .cell.filled {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.25);
  }

  .cell.revealed {
    background: rgba(100,60,255,0.15);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(150,100,255,0.35);
    color: #fff;
    animation: revealCell 0.5s cubic-bezier(0.34,1.56,0.64,1);
    text-shadow: 0 0 20px rgba(180,140,255,0.8), 0 0 40px rgba(120,80,255,0.4);
    box-shadow: 0 0 16px rgba(120,80,255,0.2), inset 0 1px 0 rgba(255,255,255,0.15);
  }

  @keyframes revealCell {
    0% { transform: scale(0.5) rotateY(90deg); opacity: 0; }
    60% { transform: scale(1.1) rotateY(-5deg); }
    100% { transform: scale(1) rotateY(0deg); opacity: 1; }
  }

  /* Divider */
  .divider {
    height: 1px;
    margin: 0 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  }

  /* Current word display */
  .current-word-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 14px 20px 8px;
    min-height: 52px;
  }

  .current-word {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 0 20px rgba(180,140,255,0.9), 0 0 40px rgba(120,80,255,0.5);
    transition: all 0.2s ease;
    min-width: 40px;
    text-align: center;
  }

  .current-word.shake {
    animation: shake 0.4s ease;
    color: #ff6b6b;
    text-shadow: 0 0 20px rgba(255,80,80,0.8);
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  /* Wheel container */
  .wheel-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 10px 0 30px;
  }

  .wheel {
    position: relative;
    width: 240px;
    height: 240px;
    touch-action: none;
    user-select: none;
  }

  /* SVG lines layer */
  .wheel-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .line-path {
    stroke: rgba(180,140,255,0.7);
    stroke-width: 3;
    stroke-linecap: round;
    fill: none;
    filter: drop-shadow(0 0 6px rgba(140,100,255,0.8));
  }

  /* Wheel center glow */
  .wheel-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 80px; height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .wheel-glow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,60,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Letter buttons */
  .letter-btn {
    position: absolute;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(16px);
    border: 1.5px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.9);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: all 0.15s ease;
    z-index: 2;
    transform: translate(-50%,-50%);
  }

  .letter-btn.selected {
    background: rgba(120,80,255,0.4);
    border-color: rgba(180,140,255,0.7);
    color: #fff;
    box-shadow: 0 0 20px rgba(120,80,255,0.5), 0 0 40px rgba(80,40,200,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    text-shadow: 0 0 12px rgba(200,170,255,1);
    transform: translate(-50%,-50%) scale(1.15);
  }

  .letter-btn.used {
    opacity: 0.35;
    transform: translate(-50%,-50%) scale(0.9);
  }

  /* Bottom hint */
  .hint-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 0 20px 12px;
  }

  .hint-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .hint-btn:active { transform: scale(0.95); }

  .hint-icon { font-size: 22px; }
  .hint-label { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; }

  /* Win overlay */
  .win-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
    z-index: 100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 20px;
  }

  .win-overlay.show { display: flex; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .win-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 28px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 0 80px rgba(120,80,255,0.3);
  }

  .win-emoji { font-size: 56px; display: block; margin-bottom: 12px; }

  .win-title {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, #b8a0ff 50%, #60c0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  .win-sub { font-size: 15px; color: rgba(255,255,255,0.5); }

  .next-btn {
    background: linear-gradient(135deg, #7840ff 0%, #4060ff 100%);
    border: none;
    border-radius: 20px;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(100,60,255,0.5);
    letter-spacing: 0.5px;
  }

  @media (max-width: 420px) {
    .phone { width: 100vw; height: 100vh; }
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="stars"></div>

<div class="phone">
  <!-- Header -->
  <div class="header">
    <div class="level-badge">LEVEL 1</div>
    <div class="header-title">WORDS</div>
    <div class="coins"><span class="coin-icon">🪙</span><span id="coins">51</span></div>
  </div>

  <!-- Found words -->
  <div class="found-words" id="foundWords"></div>

  <!-- Crossword grid -->
  <div class="grid-container">
    <div class="crossword-grid" id="crosswordGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- Current word being formed -->
  <div class="current-word-wrap">
    <div class="current-word" id="currentWord">&#8203;</div>
  </div>

  <!-- Wheel -->
  <div class="wheel-wrap">
    <div class="wheel" id="wheel">
      <div class="wheel-glow"></div>
      <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 240 240"></svg>
      <div class="wheel-center"></div>
    </div>
  </div>

  <!-- Hint buttons -->
  <div class="hint-row">
    <div class="hint-btn" onclick="shuffle()">
      <span class="hint-icon">🔀</span>
      <span class="hint-label">SHUFFLE</span>
    </div>
    <div class="hint-btn" onclick="useHint()">
      <span class="hint-icon">💡</span>
      <span class="hint-label">HINT</span>
    </div>
    <div class="hint-btn">
      <span class="hint-icon">⚡</span>
      <span class="hint-label">BOOST</span>
    </div>
  </div>
</div>

<!-- Win overlay -->
<div class="win-overlay" id="winOverlay">
  <div class="win-card">
    <span class="win-emoji">🎉</span>
    <div class="win-title">LEVEL COMPLETE!</div>
    <div class="win-sub">All words found</div>
  </div>
  <button class="next-btn" onclick="resetGame()">NEXT LEVEL →</button>
</div>

<script>
// ─── GAME DATA ───────────────────────────────────────────────
const LEVELS = [
  {
    letters: ['S','P','I','N','E'],
    words: ['SPIN','SNIPE','PINE','PIN','SIN','NIE','SINE','PEN','PINES'],
    required: ['SPIN','PINE','SNIPE','SIN','PIN'],
    grid: {
      cols: 7, rows: 7,
      placements: [
        { word: 'SPIN',  row: 0, col: 0, dir: 'H' },
        { word: 'SNIPE', row: 0, col: 0, dir: 'V' },
        { word: 'PINE',  row: 2, col: 2, dir: 'H' },
        { word: 'SIN',   row: 4, col: 0, dir: 'H' },
        { word: 'PIN',   row: 0, col: 2, dir: 'V' },
      ]
    }
  }
];

let level = LEVELS[0];
let foundWords = new Set();
let selectedLetters = []; // [{index, letter}]
let isDragging = false;

// ─── GRID BUILDER ────────────────────────────────────────────
function buildGrid() {
  const { cols, rows, placements } = level.grid;
  const g = level.grid;

  // Create matrix
  const matrix = Array.from({length:rows}, () => Array(cols).fill(null));

  // Mark cells
  placements.forEach(p => {
    for (let i = 0; i < p.word.length; i++) {
      const r = p.dir === 'H' ? p.row : p.row + i;
      const c = p.dir === 'H' ? p.col + i : p.col;
      matrix[r][c] = { letter: p.word[i], word: p.word };
    }
  });

  // Find bounding box
  let minR=rows, maxR=0, minC=cols, maxC=0;
  matrix.forEach((row,r) => row.forEach((cell,c) => {
    if (cell) { minR=Math.min(minR,r); maxR=Math.max(maxR,r); minC=Math.min(minC,c); maxC=Math.max(maxC,c); }
  }));

  const el = document.getElementById('crosswordGrid');
  const usedCols = maxC - minC + 1;
  const usedRows = maxR - minR + 1;
  el.style.gridTemplateColumns = `repeat(${usedCols}, 46px)`;
  el.style.gridTemplateRows = `repeat(${usedRows}, 46px)`;
  el.innerHTML = '';

  for (let r = minR; r <= maxR; r++) {
    for (let c = minC; c <= maxC; c++) {
      const cell = document.createElement('div');
      const data = matrix[r][c];
      if (data) {
        cell.className = 'cell blank';
        cell.dataset.letter = data.letter;
        cell.dataset.word = data.word;
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.id = `cell-${r}-${c}`;
      } else {
        cell.className = 'cell empty';
      }
      el.appendChild(cell);
    }
  }
}

function revealWord(word) {
  const { placements } = level.grid;
  const placement = placements.find(p => p.word === word);
  if (!placement) return;

  for (let i = 0; i < word.length; i++) {
    const r = placement.dir === 'H' ? placement.row : placement.row + i;
    const c = placement.dir === 'H' ? placement.col + i : placement.col;
    const cell = document.getElementById(`cell-${r}-${c}`);
    if (cell) {
      setTimeout(() => {
        cell.classList.remove('blank');
        cell.classList.add('revealed');
        cell.textContent = word[i];
      }, i * 80);
    }
  }
}

// ─── LETTER WHEEL ────────────────────────────────────────────
let letterPositions = []; // [{x, y, letter, index}]

function buildWheel() {
  const wheel = document.getElementById('wheel');
  // Remove old btns
  wheel.querySelectorAll('.letter-btn').forEach(b=>b.remove());

  const cx = 120, cy = 120, r = 90;
  letterPositions = [];

  level.letters.forEach((letter, i) => {
    const angle = (i / level.letters.length) * Math.PI * 2 - Math.PI / 2;
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    letterPositions.push({x, y, letter, index: i});

    const btn = document.createElement('div');
    btn.className = 'letter-btn';
    btn.textContent = letter;
    btn.id = `lbtn-${i}`;
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
    wheel.appendChild(btn);
  });
}

function getLetterAtPoint(x, y) {
  const wheel = document.getElementById('wheel');
  const rect = wheel.getBoundingClientRect();
  const px = x - rect.left;
  const py = y - rect.top;

  for (const pos of letterPositions) {
    const dx = px - pos.x;
    const dy = py - pos.y;
    if (Math.sqrt(dx*dx + dy*dy) < 32) return pos;
  }
  return null;
}

function updateSvgLines(cursorX, cursorY) {
  const svg = document.getElementById('wheelSvg');
  svg.innerHTML = '';

  const pts = selectedLetters.map(s => letterPositions[s.index]);

  for (let i = 0; i < pts.length - 1; i++) {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', pts[i].x);
    line.setAttribute('y1', pts[i].y);
    line.setAttribute('x2', pts[i+1].x);
    line.setAttribute('y2', pts[i+1].y);
    line.setAttribute('class','line-path');
    svg.appendChild(line);
  }

  if (isDragging && pts.length > 0 && cursorX !== undefined) {
    const wheel = document.getElementById('wheel');
    const rect = wheel.getBoundingClientRect();
    const last = pts[pts.length-1];
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', last.x);
    line.setAttribute('y1', last.y);
    line.setAttribute('x2', cursorX - rect.left);
    line.setAttribute('y2', cursorY - rect.top);
    line.setAttribute('stroke', 'rgba(180,140,255,0.3)');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('fill', 'none');
    svg.appendChild(line);
  }
}

function updateCurrentWord() {
  const word = selectedLetters.map(s=>s.letter).join('');
  const el = document.getElementById('currentWord');
  el.textContent = word || '​';
  el.classList.remove('shake');
}

function updateBtnStates() {
  const selIndices = new Set(selectedLetters.map(s=>s.index));
  letterPositions.forEach((pos, i) => {
    const btn = document.getElementById(`lbtn-${i}`);
    if (selIndices.has(i)) {
      btn.classList.add('selected');
      btn.classList.remove('used');
    } else {
      btn.classList.remove('selected');
      btn.classList.remove('used');
    }
  });
}

function trySubmit() {
  const word = selectedLetters.map(s=>s.letter).join('');
  if (word.length < 2) { resetSelection(); return; }

  const valid = level.words.includes(word) && !foundWords.has(word);
  const isRequired = level.required.includes(word);

  if (valid) {
    foundWords.add(word);
    document.getElementById('coins').textContent = parseInt(document.getElementById('coins').textContent) + word.length * 5;

    // Add tag
    if (isRequired) {
      const tag = document.createElement('div');
      tag.className = 'found-word-tag';
      tag.textContent = word;
      document.getElementById('foundWords').appendChild(tag);
      revealWord(word);
    }

    resetSelection();

    if (level.required.every(w => foundWords.has(w))) {
      setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 800);
    }
  } else {
    // Shake
    const el = document.getElementById('currentWord');
    el.classList.add('shake');
    setTimeout(() => { el.classList.remove('shake'); resetSelection(); }, 500);
  }
}

function resetSelection() {
  selectedLetters = [];
  isDragging = false;
  updateCurrentWord();
  updateBtnStates();
  updateSvgLines();
}

// ─── TOUCH/MOUSE EVENTS ──────────────────────────────────────
function onStart(e) {
  e.preventDefault();
  isDragging = true;
  selectedLetters = [];
  const pt = e.touches ? e.touches[0] : e;
  const pos = getLetterAtPoint(pt.clientX, pt.clientY);
  if (pos) { selectedLetters.push(pos); updateBtnStates(); updateCurrentWord(); }
  updateSvgLines(pt.clientX, pt.clientY);
}

function onMove(e) {
  e.preventDefault();
  if (!isDragging) return;
  const pt = e.touches ? e.touches[0] : e;
  const pos = getLetterAtPoint(pt.clientX, pt.clientY);
  if (pos) {
    const already = selectedLetters.findIndex(s=>s.index===pos.index);
    if (already === -1) {
      selectedLetters.push(pos);
      updateBtnStates();
      updateCurrentWord();
    } else if (already === selectedLetters.length - 2) {
      // Backtrack
      selectedLetters.pop();
      updateBtnStates();
      updateCurrentWord();
    }
  }
  updateSvgLines(pt.clientX, pt.clientY);
}

function onEnd(e) {
  e.preventDefault();
  isDragging = false;
  updateSvgLines();
  trySubmit();
}

const wheel = document.getElementById('wheel');
wheel.addEventListener('touchstart', onStart, {passive:false});
wheel.addEventListener('touchmove', onMove, {passive:false});
wheel.addEventListener('touchend', onEnd, {passive:false});
wheel.addEventListener('mousedown', onStart);
document.addEventListener('mousemove', (e) => { if(isDragging) onMove(e); });
document.addEventListener('mouseup', (e) => { if(isDragging) onEnd(e); });

// ─── SHUFFLE ─────────────────────────────────────────────────
function shuffle() {
  for (let i = level.letters.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [level.letters[i], level.letters[j]] = [level.letters[j], level.letters[i]];
  }
  buildWheel();
  resetSelection();
}

// ─── HINT ────────────────────────────────────────────────────
function useHint() {
  const remaining = level.required.filter(w => !foundWords.has(w));
  if (!remaining.length) return;
  const word = remaining[0];
  const coins = parseInt(document.getElementById('coins').textContent);
  if (coins < 10) { alert('Not enough coins!'); return; }
  document.getElementById('coins').textContent = coins - 10;

  // Auto-select letters
  resetSelection();
  for (const letter of word) {
    const pos = letterPositions.find(p => p.letter === letter && !selectedLetters.some(s=>s.index===p.index));
    if (pos) selectedLetters.push(pos);
  }
  updateBtnStates();
  updateCurrentWord();
  updateSvgLines();
  setTimeout(trySubmit, 800);
}

// ─── RESET ───────────────────────────────────────────────────
function resetGame() {
  foundWords = new Set();
  document.getElementById('foundWords').innerHTML = '';
  document.getElementById('winOverlay').classList.remove('show');
  buildGrid();
  buildWheel();
  resetSelection();
}

// ─── INIT ────────────────────────────────────────────────────
buildGrid();
buildWheel();
</script>
